apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
type: Opaque  # "Opaque" default for arbitrary key value pairs 
data: # actual contents in key-value pairs, base64 encoded
  mongo-root-username: dXNlcm5hbWU=
  mongo-root-password: cGFzc3dvcmQ=

